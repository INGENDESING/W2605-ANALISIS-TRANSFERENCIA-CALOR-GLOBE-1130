services:
  - type: web
    name: p2611-flask-api
    runtime: python
    buildCommand: "pip install -r webapp/requirements.txt"
    startCommand: "cd webapp && gunicorn -w 4 -b 0.0.0.0:$PORT wsgi:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
