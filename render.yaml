services:
  - type: web
    name: w2605-webapp
    runtime: python
    buildCommand: "pip install -r webapp/requirements.txt"
    startCommand: "cd webapp && gunicorn -w 4 -b 0.0.0.0:$PORT wsgi:app"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
